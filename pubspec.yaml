name: music_player
description: A new Flutter project for downloading and playing music from YouTube.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  youtube_explode_dart: ^3.0.0
  just_audio: ^0.9.36
  dio: ^5.4.0
  metadata_god: ^1.1.0
  path_provider: ^2.1.2
  flutter_riverpod: ^2.4.9
  percent_indicator: ^4.2.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
